<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisyui and tailwind link here -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header class="min-h-screen w-[80%] mx-auto flex justify-center items-center">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto">
            <!-- <legend class="fieldset-legend"></legend> -->
             <div>
                <img class="mx-auto" src="./assets/github-logo.png">
                <h2 class="text-center">GitHub Issues Tracker</h2>
                <p class="text-center">Sign in to manage your issues</p>
             </div>

            <label class="label">Username</label>
            <input id="userinput" type="email" class="input" placeholder="Enter Username" />

            <label class="label">Password</label>
            <input id="userpassword" type="password" class="input" placeholder="Enter Password" />

            <button id="sing-in" class="btn btn-neutral mt-4">Login</button>
        </fieldset>
    </header>

    <script src="login.js"></script>
</body>

</html>
